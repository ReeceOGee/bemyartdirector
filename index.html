<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Be My Art Director</title>
<style>
  :root {
    --pink: #fd297b;
    --orange: #ff655b;
    --yellow: #ffad08;
    --gradient: linear-gradient(135deg, #fd297b 0%, #ff655b 50%, #ffad08 100%);
    --card-radius: 20px;
    --dark: #1a1a1a;
    --grey: #888;
    --light-grey: #f5f5f5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: var(--gradient);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Floating bg ── */
  .float-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .floater {
    position: absolute; bottom: -160px;
    animation: floatUp linear infinite;
    opacity: 0;
  }
  .floater.is-emoji { line-height: 1; }
  .floater.is-face { border-radius: 0; overflow: visible; }
  .floater.is-face img { width: 100%; height: 100%; object-fit: contain; display: block; }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(-4deg); opacity: 0; }
    8%   { opacity: 0.65; }
    92%  { opacity: 0.3; }
    100% { transform: translateY(-125vh) rotate(18deg); opacity: 0; }
  }

  /* ── Emoji rain (top to bottom) ── */
  #emoji-rain {
    position: fixed; inset: 0; z-index: 400;
    pointer-events: none; overflow: hidden;
    display: none;
  }
  .rain-drop {
    position: absolute; top: -60px;
    animation: fallDown linear forwards;
  }
  @keyframes fallDown {
    0%   { transform: translateY(0) rotate(-8deg); opacity: 1; }
    100% { transform: translateY(115vh) rotate(12deg); opacity: 0.2; }
  }

  /* ── Intro ── */
  #intro {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--gradient);
    text-align: center; padding: 40px 24px;
    transition: opacity 0.6s, transform 0.6s;
  }
  #intro.hidden { opacity: 0; transform: scale(1.05); pointer-events: none; }
  .intro-hearts { font-size: 52px; margin-bottom: 24px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);}50%{transform:scale(1.12);} }
  .intro-title { font-size: clamp(34px,9vw,62px); font-weight:700; color:white; line-height:1.08; margin-bottom:20px; text-shadow:0 4px 20px rgba(0,0,0,0.18); }
  .intro-sub { font-size:clamp(14px,3.5vw,17px); color:rgba(255,255,255,0.85); max-width:300px; line-height:1.55; margin-bottom:40px; }
  .intro-btn { background:white; color:var(--pink); border:none; padding:16px 44px; border-radius:999px; font-family:inherit; font-size:17px; font-weight:600; cursor:pointer; box-shadow:0 8px 30px rgba(0,0,0,0.2); transition:transform 0.15s; }
  .intro-btn:hover { transform:scale(1.04); }
  .intro-btn:active { transform:scale(0.97); }

  /* ── App ── */
  #app {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px 16px;
    gap: 24px;
  }
  .app-header { width:100%; max-width:420px; display:flex; align-items:center; justify-content:space-between; }
  .app-logo { font-size:20px; font-weight:700; color:white; text-shadow:0 2px 8px rgba(0,0,0,0.15); }
  .app-counter { background:rgba(255,255,255,0.25); color:white; font-size:13px; font-weight:500; padding:5px 12px; border-radius:999px; backdrop-filter:blur(8px); }

  /* ── Deck ── */
  #deck {
    position: relative;
    width: min(92vw, 400px);
    height: min(136vw, 580px);
    flex-shrink: 0;
  }
  .profile-card {
    position: absolute; inset: 0;
    border-radius: var(--card-radius);
    overflow: hidden; background: white;
    box-shadow: 0 16px 48px rgba(0,0,0,0.28);
    cursor: grab; user-select: none; touch-action: none;
    will-change: transform;
    display: flex; flex-direction: column;
  }
  .profile-card:active { cursor: grabbing; }
  .card-photo { width:100%; height:60%; object-fit:cover; object-position:center top; display:block; pointer-events:none; flex-shrink:0; }
  .card-bottom { flex:1; background:white; padding:14px 18px 16px; display:flex; flex-direction:column; justify-content:center; }
  .card-name-row { display:flex; align-items:baseline; gap:7px; margin-bottom:3px; }
  .card-name { font-size:clamp(20px,5.5vw,26px); font-weight:700; color:var(--dark); }
  .card-age { font-size:19px; color:var(--dark); font-weight:400; }
  .card-role { font-size:12px; color:var(--grey); margin-bottom:10px; }
  .card-copy { font-size:14px; line-height:1.6; color:#333; }
  .stamp { position:absolute; top:20px; font-size:24px; font-weight:800; border:4px solid; border-radius:8px; padding:5px 14px; letter-spacing:2px; text-transform:uppercase; opacity:0; pointer-events:none; transition:opacity 0.1s; }
  .stamp-like { left:16px; color:#21d07a; border-color:#21d07a; transform:rotate(-15deg); }
  .stamp-nope { right:16px; color:#f55; border-color:#f55; transform:rotate(15deg); }
  .card-expand-hint { position:absolute; top:14px; right:14px; width:32px; height:32px; border-radius:50%; background:rgba(0,0,0,0.32); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; font-size:15px; color:white; cursor:pointer; border:none; z-index:5; }

  /* ── Controls ── */
  #controls { display:flex; align-items:center; justify-content:center; gap:16px; }
  .ctrl-btn { border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:50%; transition:transform 0.15s, box-shadow 0.15s; box-shadow:0 6px 20px rgba(0,0,0,0.2); }
  .ctrl-btn:hover { transform:scale(1.1); }
  .ctrl-btn:active { transform:scale(0.94); }
  .btn-nope { width:58px; height:58px; background:white; font-size:26px; color:#f55; }
  .btn-like { width:70px; height:70px; background:var(--gradient); font-size:30px; color:white; }

  /* ── Detail panel ── */
  #profile-detail { position:fixed; inset:0; z-index:50; background:white; overflow-y:auto; transform:translateY(100%); transition:transform 0.4s cubic-bezier(0.32,0.72,0,1); }
  #profile-detail.open { transform:translateY(0); }
  .detail-photo { width:100%; height:min(70vw,380px); object-fit:cover; object-position:top; display:block; }
  .detail-close { position:absolute; top:16px; right:16px; width:36px; height:36px; border-radius:50%; background:rgba(0,0,0,0.4); color:white; border:none; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; z-index:5; }
  .detail-body { padding:20px; }
  .detail-name-row { display:flex; align-items:baseline; gap:8px; margin-bottom:4px; }
  .detail-name { font-size:28px; font-weight:700; color:var(--dark); }
  .detail-age { font-size:22px; color:var(--dark); }
  .detail-meta { color:var(--grey); font-size:14px; margin-bottom:14px; }
  .detail-vibe-pill { display:inline-flex; align-items:center; background:#fff0f5; color:var(--pink); font-size:13px; font-weight:600; padding:6px 14px; border-radius:999px; margin-bottom:16px; border:1px solid #ffd0e4; }
  .detail-section { margin-bottom:18px; }
  .detail-section h3 { font-size:18px; font-weight:700; color:var(--dark); margin-bottom:8px; }
  .detail-section p { font-size:15px; line-height:1.65; color:#444; }
  .detail-actions { display:flex; gap:12px; margin-top:20px; padding-bottom:40px; }
  .detail-btn { flex:1; padding:14px; border-radius:14px; border:none; font-family:inherit; font-size:15px; font-weight:600; cursor:pointer; }
  .detail-btn-primary { background:var(--gradient); color:white; }
  .detail-btn-secondary { background:var(--light-grey); color:var(--dark); }

  /* ── End screen ── */
  #end-screen { position:fixed; inset:0; z-index:200; background:var(--gradient); display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 24px; }
  #end-screen.visible { display:flex; }
  .end-emoji { font-size:72px; margin-bottom:16px; animation:bounce 0.6s ease; }
  @keyframes bounce { 0%,100%{transform:scale(1);}40%{transform:scale(1.3);}70%{transform:scale(0.9);} }
  .end-title { font-size:clamp(34px,10vw,54px); font-weight:700; color:white; margin-bottom:10px; text-shadow:0 4px 20px rgba(0,0,0,0.2); }
  .end-sub { font-size:17px; color:rgba(255,255,255,0.9); margin-bottom:8px; line-height:1.5; max-width:300px; }
  .end-tagline { font-size:15px; color:rgba(255,255,255,0.7); margin-bottom:32px; font-style:italic; max-width:280px; }
  .end-btns { display:flex; flex-direction:column; gap:12px; width:100%; max-width:300px; }
  .end-btn { padding:16px 24px; border-radius:999px; border:none; font-family:inherit; font-size:16px; font-weight:600; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 6px 20px rgba(0,0,0,0.2); transition:transform 0.15s; }
  .end-btn:hover { transform:scale(1.03); }
  .end-btn-li { background:white; color:#0a66c2; }
  .end-btn-ig { background:white; color:var(--pink); }
  .end-btn-site { background:rgba(255,255,255,0.2); color:white; border:2px solid rgba(255,255,255,0.5); }
  .end-restart { margin-top:20px; background:none; border:none; color:rgba(255,255,255,0.6); font-size:13px; cursor:pointer; text-decoration:underline; font-family:inherit; }

  /* ── Feedback flash ── */
  #feedback { position:fixed; inset:0; z-index:350; display:flex; align-items:center; justify-content:center; pointer-events:none; opacity:0; transition:opacity 0.15s; }
  #feedback.show { opacity:1; }
  #feedback span { font-size:80px; filter:drop-shadow(0 4px 20px rgba(0,0,0,0.3)); }
</style>
</head>
<body>

<div class="float-bg" id="floatBg"></div>
<div id="emoji-rain"></div>

<!-- Intro -->
<div id="intro">
  <div class="intro-hearts">💘</div>
  <h1 class="intro-title">Could you be my<br>Art Director?</h1>
  <p class="intro-sub" style="white-space:nowrap;max-width:none;">Start swiping to find your perfect copywriter.<br>Swipe right to like, left to pass.</p>
  <button class="intro-btn" onclick="startApp()">Start Swiping 👀</button>
</div>

<!-- App -->
<div id="app" style="display:none;">
  <div class="app-header">
    <div class="app-logo">💘 Reece</div>
    <div class="app-counter" id="counter">1 / 5</div>
  </div>
  <div id="deck"></div>
  <div id="controls">
    <button class="ctrl-btn btn-nope" onclick="swipe('left')" title="Pass">✕</button>
    <button class="ctrl-btn btn-like" onclick="swipe('right')" title="Like">♥</button>
  </div>
</div>

<!-- Detail panel -->
<div id="profile-detail">
  <div style="position:relative;">
    <img class="detail-photo" id="detail-photo" src="" alt="" />
    <button class="detail-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="detail-body">
    <div class="detail-name-row">
      <span class="detail-name" id="detail-name"></span>
      <span class="detail-age">26</span>
      <span>✅</span>
    </div>
    <div class="detail-meta">📍 Auckland, NZ &nbsp;•&nbsp; ✏️ Junior Copywriter — Special</div>
    <div class="detail-vibe-pill" id="detail-vibe-pill"></div>
    <div class="detail-section">
      <h3>About this Reece</h3>
      <p id="detail-bio-full"></p>
    </div>
    <div class="detail-actions">
      <button class="detail-btn detail-btn-secondary" onclick="closeDetail()">← Back</button>
      <button class="detail-btn detail-btn-primary" onclick="swipeFromDetail('right')">We vibe ♥</button>
    </div>
  </div>
</div>

<!-- End screen -->
<div id="end-screen">
  <div class="end-emoji" id="end-emoji">💘</div>
  <div class="end-title" id="end-title"></div>
  <div class="end-sub" id="end-sub"></div>
  <div class="end-tagline" id="end-tagline"></div>
  <div class="end-btns" id="end-btns"></div>
  <button class="end-restart" onclick="restartApp()">Start over</button>
</div>

<div id="feedback"><span id="feedback-icon"></span></div>

<script>
const FACE_URIS = [
  "Face_1.png",
  "Face_2.png",
  "Face_3.png",
  "Face_4.png",
  "Face_5.png",
];

const SAD_EMOJIS   = ["😢","😭","💔","😿","🥺","😞","😔","🙁","💧","😣"];
const HEART_EMOJIS = ["💘","💕","❤️","💗","💓","💝","💖","🥰","😍","💞"];
const ALL_EMOJIS   = ["💘","💕","❤️","💗","💓","✨","💝","💖","✍️","💻","🖊️","📝","🎨","🖋️","💡","📖"];

const PROFILES = [
  { name:"Finance Reece", vibe:"📈 Banking & Finance", photo:"finance.jpg",
    copy1:"I'm like a finance bro, but without the Patagonia vest and RM Williams. Actually, I’m nothing like a finance bro. I day trade big ideas for clients like Kiwibank, Fisher Funds and Squirrel instead. So if you wanna chat moola, swipe right.",
    bioFull:"I'm like a finance bro, but without the Patagonia vest and RM Williams. Actually, I’m nothing like a finance bro. I day trade big ideas for clients like Kiwibank, Fisher Funds and Squirrel instead. So if you wanna chat moola, swipe right." },
  { name:"Sport Reece", vibe:"🏉 Sports & Broadcasting", photo:"sport.jpg",
    copy1:"I love sport. The big hits, screamers, bangers and 'boomfas. If there's a sports brief in the building, I'll be trying to sink my baseball mitts into it. I've created campaigns for Sky Sport and tried to make a sports betting platform actually look cool. So let me know if you wanna chat sport and I'll get warmed up.",
    bioFull:"I love sport. The big hits, screamers, bangers and 'boomfas. If there's a sports brief in the building, I'll be trying to sink my baseball mitts into it. I've created campaigns for Sky Sport and tried to make a sports betting platform actually look cool. So let me know if you wanna chat sport and I'll get warmed up." },
  { name:"Foodie Reece", vibe:"🍟 Food & Snacks", photo:"food.jpg",
    copy1:"Look at me. I love food. But I also like making ads for food. Like ENVY™, premium New Zealand export apples, and our favourite chippie brand from our childhood. If it's edible, I'm keen to write something delicious about it. So if you wanna chat crisp crunches and delightful mouthfeel moments, swipe right.",
    bioFull:"Look at me. I love food. But I also like making ads for food. Like ENVY™, premium New Zealand export apples, and our favourite chippie brands from our childhood. If it's edible, I'm keen to write something delicious about it. So if you wanna chat crisp crunches and delightful mouthfeel moments, swipe right." },
  { name:"Government Work Reece", vibe:"🏛️ Government & Public Good", photo:"government.jpg",
    copy1:"I'm always ready to drop in and serve my country.... from behind a screen and a Word doc instead of in the field. If you wanna put your brain on the front lines for this country, let me know and let's get deployed.",
    bioFull:"I'm always ready to drop in and serve my country.... from behind a screen and a Word doc instead of in the field. If you wanna put your brain on the front lines for this country, let me know and let's get deployed." },
  { name:"Proactive Reece", vibe:"✨ Proactive & Passion Projects", photo:"fun.jpg",
    copy1:"You’ve made it this far, so lets start banging…..out proactive ideas. I’m thinking, you, me, on the boardroom table after hours, going at it…. in the google slides deck so that we can convince a Grand Prix idea that gets us a free trip to Cannes. If this is getting your creative juices flowing, swipe right 🥵",
    bioFull:"You’ve made it this far, so lets start banging…..out proactive ideas. I’m thinking, you, me, on the boardroom table after hours, going at it…. in the google slides deck so that we can convince a Grand Prix idea that gets us a free trip to Cannes. If this is getting your creative juices flowing, swipe right 🥵" }
];

// ── Floaters ──
function spawnFloaters() {
  const container = document.getElementById("floatBg");
  // 40 emoji floaters
  for (let i = 0; i < 40; i++) {
    const el = document.createElement("div");
    el.className = "floater is-emoji";
    el.textContent = ALL_EMOJIS[Math.floor(Math.random() * ALL_EMOJIS.length)];
    const size = 14 + Math.random() * 22;
    el.style.fontSize = size + "px";
    el.style.left = Math.random() * 100 + "vw";
    const dur = 7 + Math.random() * 12;
    el.style.animationDuration = dur + "s";
    el.style.animationDelay = -(Math.random() * dur) + "s";
    container.appendChild(el);
  }
  // 16 face floaters — spread evenly across full width
  const faceSizes = [80, 150, 200, 260, 400];
  for (let i = 0; i < 16; i++) {
    const el = document.createElement("div");
    el.className = "floater is-face";
    const sz = faceSizes[Math.floor(Math.random() * faceSizes.length)];
    el.style.width = sz + "px";
    el.style.height = sz + "px";
    // Spread evenly: divide screen into 16 slots, randomise within each slot
    const slot = (i / 16) * 100;
    el.style.left = (slot + Math.random() * 6 - 3) + "vw";
    const dur = 10 + Math.random() * 14;
    el.style.animationDuration = dur + "s";
    el.style.animationDelay = -(Math.random() * dur) + "s";
    const img = document.createElement("img");
    img.src = FACE_URIS[Math.floor(Math.random() * FACE_URIS.length)];
    img.style.cssText = "width:100%;height:100%;object-fit:contain;display:block;";
    el.appendChild(img);
    container.appendChild(el);
  }
}

// ── Emoji rain (top → bottom) ──
function triggerRain(pool, count) {
  const rain = document.getElementById("emoji-rain");
  rain.innerHTML = "";
  rain.style.display = "block";
  for (let i = 0; i < count; i++) {
    const drop = document.createElement("div");
    drop.className = "rain-drop";
    drop.textContent = pool[Math.floor(Math.random() * pool.length)];
    drop.style.left = Math.random() * 100 + "vw";
    drop.style.fontSize = (20 + Math.random() * 22) + "px";
    const dur = 0.7 + Math.random() * 0.6;
    drop.style.animationDuration = dur + "s";
    drop.style.animationDelay = (Math.random() * 0.4) + "s";
    rain.appendChild(drop);
  }
  setTimeout(() => { rain.style.display = "none"; rain.innerHTML = ""; }, 1600);
}

// ── State ──
let currentIndex = 0, cardEls = [], isDragging = false;
let startX = 0, currentX = 0, activeCard = null, likeCount = 0;
let swiping = false; // lock during transition

function startApp() {
  document.getElementById("intro").classList.add("hidden");
  spawnFloaters();
  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.getElementById("app").style.display = "flex";
    buildDeck();
  }, 600);
}

function buildDeck() {
  const deck = document.getElementById("deck");
  deck.querySelectorAll(".profile-card").forEach(c => c.remove());
  cardEls = []; currentIndex = 0; likeCount = 0; swiping = false;
  for (let i = PROFILES.length - 1; i >= 0; i--) {
    const card = createCard(i);
    deck.appendChild(card);
    cardEls[i] = card;
  }
  updateStack(); updateCounter();
}

function createCard(i) {
  const p = PROFILES[i];
  const card = document.createElement("div");
  card.className = "profile-card";
  card.innerHTML = `
    <img class="card-photo" src="${p.photo}" alt="${p.name}" draggable="false" />
    <div class="card-bottom">
      <div class="card-name-row">
        <span class="card-name">${p.name}</span>
        <span class="card-age">26</span>
        <span>✅</span>
      </div>
      <div class="card-role">📍 Auckland, NZ · Junior Copywriter — Special</div>
      <p class="card-copy">${p.copy1}
    </div>
    <div class="stamp stamp-like">VIBE ♥</div>
    <div class="stamp stamp-nope">PASS</div>
    <button class="card-expand-hint" onclick="openDetail(${i})">ℹ</button>
  `;
  setupDrag(card, i);
  return card;
}

function updateStack() {
  cardEls.forEach((card, i) => {
    if (i < currentIndex) { card.style.display = "none"; return; }
    card.style.display = "block";
    const pos = i - currentIndex;
    if (pos >= 3) { card.style.opacity = "0"; card.style.pointerEvents = "none"; return; }
    card.style.opacity = "1";
    card.style.zIndex = PROFILES.length - pos;
    card.style.transition = "transform 0.3s ease, opacity 0.3s";
    card.style.transform = `scale(${1 - pos * 0.04}) translateY(${pos * 10}px)`;
    card.style.pointerEvents = pos === 0 ? "auto" : "none";
  });
}

function updateCounter() {
  const shown = Math.min(currentIndex + 1, PROFILES.length);
  document.getElementById("counter").textContent =
    currentIndex < PROFILES.length ? `${shown} / ${PROFILES.length}` : "";
}

function setupDrag(card, idx) {
  card.addEventListener("mousedown", e => dragStart(e, card, idx));
  card.addEventListener("touchstart", e => dragStart(e, card, idx), {passive:true});
  window.addEventListener("mousemove", e => dragMove(e, card, idx));
  window.addEventListener("touchmove", e => dragMove(e, card, idx), {passive:true});
  window.addEventListener("mouseup", () => dragEnd(card, idx));
  window.addEventListener("touchend", () => dragEnd(card, idx));
}

function dragStart(e, card, idx) {
  if (swiping || idx !== currentIndex || e.target.classList.contains("card-expand-hint")) return;
  isDragging = true; activeCard = card;
  const pt = e.touches ? e.touches[0] : e;
  startX = pt.clientX; currentX = 0;
  card.style.transition = "none";
}

function dragMove(e, card, idx) {
  if (!isDragging || activeCard !== card || idx !== currentIndex) return;
  const pt = e.touches ? e.touches[0] : e;
  currentX = pt.clientX - startX;
  card.style.transform = `translate(${currentX}px, ${currentX * 0.08}px) rotate(${currentX * 0.06}deg)`;
  const ratio = Math.min(Math.abs(currentX) / 80, 1);
  card.querySelector(".stamp-like").style.opacity = currentX > 0 ? ratio : 0;
  card.querySelector(".stamp-nope").style.opacity = currentX < 0 ? ratio : 0;
}

function dragEnd(card, idx) {
  if (!isDragging || activeCard !== card) return;
  isDragging = false; activeCard = null;
  card.style.transition = "transform 0.35s ease, opacity 0.35s";
  if (currentX > 90) flyOut(card, "right");
  else if (currentX < -90) flyOut(card, "left");
  else {
    const pos = idx - currentIndex;
    card.style.transform = `scale(${1 - pos * 0.04}) translateY(${pos * 10}px)`;
    card.querySelector(".stamp-like").style.opacity = 0;
    card.querySelector(".stamp-nope").style.opacity = 0;
  }
  currentX = 0;
}

function flyOut(card, dir) {
  if (swiping) return;
  swiping = true;

  // Fly card off screen
  card.style.transition = "transform 0.35s ease, opacity 0.35s";
  card.style.transform = `translate(${dir === "right" ? 650 : -650}px, -60px) rotate(${dir === "right" ? 25 : -25}deg)`;
  card.style.opacity = "0";

  if (dir === "right") {
    likeCount++;
    triggerRain(HEART_EMOJIS, 30);
  } else {
    triggerRain(SAD_EMOJIS, 30);
  }

  // Wait 1 second (emoji rain time) then advance
  setTimeout(() => {
    currentIndex++;
    updateStack();
    updateCounter();
    swiping = false;
    if (currentIndex >= PROFILES.length) {
      setTimeout(showEnd, 200);
    }
  }, 1000);
}

function swipe(dir) { if (!swiping && currentIndex < PROFILES.length) flyOut(cardEls[currentIndex], dir); }
function swipeFromDetail(dir) { closeDetail(); setTimeout(() => swipe(dir), 350); }

function openDetail(idx) {
  const p = PROFILES[idx];
  document.getElementById("detail-photo").src = p.photo;
  document.getElementById("detail-name").textContent = p.name;
  document.getElementById("detail-vibe-pill").textContent = p.vibe;
  document.getElementById("detail-bio-full").textContent = p.bioFull;
  document.getElementById("profile-detail").classList.add("open");
}
function closeDetail() { document.getElementById("profile-detail").classList.remove("open"); }

function showEnd() {
  let c;
  if (likeCount === 0) {
    c = { emoji:"🧠", title:"Not Compatible.", sub:"You must be a strategist.", tag:"Respect. But also... are you sure?", showAll:false };
  } else if (likeCount <= 2) {
    c = { emoji:"🤔", title:"Could be something...", sub:"There might be something in this.", tag:"You're intrigued. Reece is intrigued. Let's find out.", showAll:true };
  } else {
    c = { emoji:"💘", title:"It's a Match!", sub:"You and Reece are compatible.", tag:"Drop him your best creative pick-up line.", showAll:true };
  }
  document.getElementById("end-emoji").textContent = c.emoji;
  document.getElementById("end-title").textContent = c.title;
  document.getElementById("end-sub").textContent = c.sub;
  document.getElementById("end-tagline").textContent = c.tag;
  document.getElementById("end-btns").innerHTML = c.showAll ? `
    <a class="end-btn end-btn-li" href="https://www.linkedin.com/in/reece-ogorman/" target="_blank" rel="noopener">💼 Message on LinkedIn</a>
    <a class="end-btn end-btn-ig" href="https://www.instagram.com/reece_ogorgeous/" target="_blank" rel="noopener">📸 DM on Instagram</a>
    <a class="end-btn end-btn-site" href="https://www.reeceog.com" target="_blank" rel="noopener">🌐 See the full portfolio</a>
  ` : `<a class="end-btn end-btn-site" href="https://www.reeceog.com" target="_blank" rel="noopener">🌐 See the portfolio anyway</a>`;
  document.getElementById("end-screen").classList.add("visible");
}

function restartApp() {
  document.getElementById("end-screen").classList.remove("visible");
  buildDeck();
}
</script>
</body>
